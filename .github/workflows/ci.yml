name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "rust-core -> target"

      - name: Install cargo tools
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-machete,cargo-audit,wasm-pack

      - name: Check formatting
        run: cargo fmt --all -- --check
        working-directory: rust-core

      - name: Lint with clippy
        run: cargo clippy --all-targets -- -D warnings
        working-directory: rust-core

      - name: Check unused dependencies
        run: cargo machete
        working-directory: rust-core

      - name: Run tests
        run: cargo test --workspace
        working-directory: rust-core

      - name: Audit dependencies
        run: cargo audit
        working-directory: rust-core

      - name: Build WASM
        run: wasm-pack build --target web --dev
        working-directory: rust-core/crates/adapter-wasm

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: wasm-pkg
          path: rust-core/crates/adapter-wasm/pkg/
          retention-days: 1

  typescript:
    name: TypeScript
    runs-on: ubuntu-latest
    needs: [rust]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download WASM artifact
        uses: actions/download-artifact@v4
        with:
          name: wasm-pkg
          path: rust-core/crates/adapter-wasm/pkg/

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint and format with Biome
        run: pnpm biome ci .

      - name: Lint Svelte with ESLint
        run: pnpm eslint "src/**/*.svelte"

      - name: Type check
        run: pnpm check

      - name: Architecture guard (dependency-cruiser)
        run: pnpm depcruise

      - name: Run tests
        run: pnpm test

      - name: Production build
        run: pnpm build

      - name: Verify no DEV logs in production build
        run: bash scripts/verify-no-dev-logs.sh
